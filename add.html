<title>Open App</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter, Arial;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
overflow:hidden;

/* переливающийся фон */
background: linear-gradient(270deg,#0f172a,#0a0f1f,#13233d,#0a0f1f);
background-size:600% 600%;
animation:bgMove 18s ease infinite;
}

/* анимация фона */
@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* сетка как на панели */
body::before{
content:"";
position:absolute;
inset:0;
background-image:
linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
background-size:40px 40px;
}

/* карточка */
.card{
position:relative;
width:420px;
padding:45px;
border-radius:20px;
text-align:center;

background:rgba(20,30,50,0.7);
backdrop-filter:blur(12px);

border:1px solid rgba(255,255,255,0.08);

box-shadow:
0 0 40px rgba(0,180,255,0.15),
0 30px 80px rgba(0,0,0,0.6);

animation:glow 6s ease-in-out infinite alternate;
}

@keyframes glow{
from{
box-shadow:
0 0 30px rgba(0,150,255,0.15),
0 30px 80px rgba(0,0,0,0.6);
}
to{
box-shadow:
0 0 60px rgba(0,200,255,0.35),
0 30px 80px rgba(0,0,0,0.6);
}
}

.title{
font-size:26px;
font-weight:600;
margin-bottom:10px;
}

.subtitle{
opacity:.6;
margin-bottom:35px;
}

/* кнопки */
.buttons{
display:flex;
gap:18px;
}

/* общая кнопка */
.btn{
flex:1;
padding:15px;
border-radius:12px;
text-decoration:none;
color:white;
font-weight:600;
position:relative;
overflow:hidden;
}

/* перелив кнопки */
.btn::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(
120deg,
#00c6ff,
#0072ff,
#00c6ff,
#00ffd5
);
background-size:300% 300%;
animation:btnMove 6s linear infinite;
z-index:-1;
}

.btn.android::before{
background:linear-gradient(
120deg,
#34d399,
#10b981,
#34d399,
#6ee7b7
);
background-size:300% 300%;
}

@keyframes btnMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.btn:hover{
transform:translateY(-4px);
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

</style>
</head>
